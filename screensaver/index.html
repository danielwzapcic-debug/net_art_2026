<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
    }

    /* Background cycles through 5 solid colors, 2s each = 10s total */
    body {
      animation: bgCycle 10s infinite steps(1);
    }

    @keyframes bgCycle {
      0%   { background-color: #e74c3c; } /* red    */
      20%  { background-color: #3498db; } /* blue   */
      40%  { background-color: #2ecc71; } /* green  */
      60%  { background-color: #f39c12; } /* orange */
      80%  { background-color: #9b59b6; } /* purple */
      100% { background-color: #e74c3c; }
    }

    /* Ape moves to a new position every 2s in sync with the color */
    .ape {
      position: fixed;
      width: 160px;
      animation: apeMove 10s infinite steps(1);
    }

    .ape img {
      width: 100%;
    }

    @keyframes apeMove {
      0%   { top: 10%;  left: 10%;  } /* top left     */
      20%  { top: 10%;  left: 70%;  } /* top right    */
      40%  { top: 70%;  left: 70%;  } /* bottom right */
      60%  { top: 70%;  left: 10%;  } /* bottom left  */
      80%  { top: 38%;  left: 40%;  } /* center       */
      100% { top: 10%;  left: 10%;  }
    }

    /* Hover speeds up the whole thing */
    body:hover {
      animation-duration: 2.5s;
    }

    body:hover .ape {
      animation-duration: 2.5s;
    }
  </style>
</head>
<body>
  <div class="ape">
    <img src="APE.png" alt="ape" />
  </div>
</body>
</html>
