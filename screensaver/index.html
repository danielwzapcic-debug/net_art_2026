<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ape</title>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }


    .system {
      position: fixed;
      top: 50%;
      left: 50%;
    }


    .king {
      position: absolute;
      width: 200px;
      transform: translate(-50%, -50%);
      z-index: 20;
      filter:
        drop-shadow(0 0 12px #ff0000)
        drop-shadow(0 0 30px #cc0000)
        drop-shadow(0 0 60px #880000);
    }

    .king img { width: 100%; display: block; }

    .orbit {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }

    .orbit img {
      position: absolute;
      display: block;
    }

    /* orbit 1 — closest */
    .o1 { animation: spin 7s linear infinite; }
    .o1 img {
      width: 65px;
      top: -32px;
      left: -170px;
      filter: hue-rotate(0deg) saturate(10) brightness(1.5) drop-shadow(0 0 8px #ff4400);
      animation: unspin 7s linear infinite;
    }


    .o2 { animation: spin 11s linear infinite reverse; }
    .o2 img {
      width: 55px;
      top: -27px;
      left: -220px;
      filter: hue-rotate(90deg) saturate(10) brightness(1.5) drop-shadow(0 0 8px #00ff88);
      animation: unspin 11s linear infinite reverse;
    }


    .o3 { animation: spin 15s linear infinite; }
    .o3 img {
      width: 50px;
      top: -25px;
      left: -270px;
      filter: hue-rotate(180deg) saturate(10) brightness(1.5) drop-shadow(0 0 8px #00aaff);
      animation: unspin 15s linear infinite;
    }


    .o4 { animation: spin 20s linear infinite reverse; }
    .o4 img {
      width: 45px;
      top: -22px;
      left: -320px;
      filter: hue-rotate(270deg) saturate(10) brightness(1.5) drop-shadow(0 0 8px #ff00ff);
      animation: unspin 20s linear infinite reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes unspin {
      to { transform: rotate(-360deg); }
    }

 
    .system:hover .o1 { animation-duration: 1.5s; }
    .system:hover .o2 { animation-duration: 2.5s; }
    .system:hover .o3 { animation-duration: 3.5s; }
    .system:hover .o4 { animation-duration: 5s;   }

    .system:hover .o1 img { animation-duration: 1.5s; }
    .system:hover .o2 img { animation-duration: 2.5s; }
    .system:hover .o3 img { animation-duration: 3.5s; }
    .system:hover .o4 img { animation-duration: 5s;   }

  </style>
</head>
<body>

  <div class="system">

    <div class="orbit o1"><img src="APE.png" /></div>
    <div class="orbit o2"><img src="APE.png" /></div>
    <div class="orbit o3"><img src="APE.png" /></div>
    <div class="orbit o4"><img src="APE.png" /></div>

    <div class="king"><img src="APE.png" /></div>

  </div>

</body>
</html>
