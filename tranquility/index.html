<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A Moment of Tranquility</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: #0c0c0c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier Prime', monospace;
    position: relative;
  }

  /* very faint light source top center */
  body::before {
    content: '';
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .ape-wrap {
    margin-bottom: 40px;
    opacity: 0;
    animation: rise 1.2s ease forwards 0.1s;
  }

  .ape-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.02);
  }

  .ape-circle img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: brightness(1.4);
  }

  .title {
    font-family: 'Special Elite', cursive;
    font-size: clamp(22px, 3.5vw, 32px);
    color: rgba(255,255,255,0.88);
    letter-spacing: 0.03em;
    text-align: center;
    opacity: 0;
    animation: rise 1.2s ease forwards 0.3s;
    margin-bottom: 10px;
  }

  .sub {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    animation: rise 1s ease forwards 0.5s;
    margin-bottom: 64px;
  }

  .choose-label {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    animation: rise 0.8s ease forwards 0.65s;
    margin-bottom: 20px;
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 0;
    opacity: 0;
    animation: rise 0.8s ease forwards 0.8s;
    border-top: 1px solid rgba(255,255,255,0.08);
    width: 220px;
  }

  .btn {
    display: block;
    padding: 14px 0;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    transition: background 0.2s;
    text-align: left;
  }

  .btn:hover .btn-label {
    color: rgba(255,255,255,0.9);
  }

  .btn-label {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    transition: color 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .btn-label span {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.2em;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <div class="ape-wrap">
    <div class="ape-circle">
      <img src="APE.png" onerror="this.style.display='none'"/>
    </div>
  </div>

  <h1 class="title">A Moment of Tranquility</h1>
  <p class="sub">take a breath &mdash; stay a while</p>

  <p class="choose-label">choose your experience</p>

  <div class="buttons">
    <a class="btn" href="calm.html">
      <div class="btn-label">Calm <span>01</span></div>
    </a>
    <a class="btn" href="news.html">
      <div class="btn-label">Good News <span>02</span></div>
    </a>
    <a class="btn" href="affirmations.html">
      <div class="btn-label">Affirmations <span>03</span></div>
    </a>
  </div>

</body>
</html>
