<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APE </title>
<style>
  body {
    margin: 0;
    background: #eee;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
    height: 100vh;
  }

  h1 {
    margin: 20px;
  }


  .box {
    width: 90%;
    max-width: 800px;
    height: 500px;
    background: #ccc;
    border: 4px solid #999;
    position: relative;
    overflow: hidden;
  }


  #ape {
    position: absolute;
    bottom: 20px;
    width: 150px;
    height: auto;
    cursor: pointer;
    transition: all 0.5s ease;
  }


  #buttons {
    margin: 20px;
  }

  button {
    padding: 12px 20px;
    margin: 0 10px;
    font-size: 1em;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>APE WORLD</h1>

<div id="buttons">
  <button id="moveBtn">Move Ape</button>
  <button id="jumpBtn">Make Ape Jump</button>
</div>

<div class="box" id="box">
  <img src="ape.png" id="ape" alt="Ape" />
</div>

<script>
  const ape = document.getElementById('ape');
  const box = document.getElementById('box');
  const moveBtn = document.getElementById('moveBtn');
  const jumpBtn = document.getElementById('jumpBtn');

  let positionX = 50; // 
  let isJumping = false;

  moveBtn.onclick = () => {
   
    if (positionX === 50) {
      positionX = 80;
    } else {
      positionX = 10;
    }
    ape.style.left = positionX + '%';
    ape.style.transform = 'translateX(-50%)';
  };

  jumpBtn.onclick = () => {
    if (isJumping) return;
    isJumping = true;
    ape.style.transition = 'transform 0.5s, box-shadow 0.3s';
    ape.style.transform = 'translateY(-150px) translateX(-50%)';
    ape.style.boxShadow = '0 20px 40px rgba(0,0,0,0.2)';
    setTimeout(() => {
      ape.style.transform = 'translateY(0) translateX(-50%)';
      ape.style.boxShadow = 'none';
      isJumping = false;
    }, 500);
  };
</script>

</body>
</html>
