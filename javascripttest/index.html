<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Random Ape Movement</title>
<style>
  body {
    margin: 0;
    background: #eee;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
    height: 100vh;
  }
  h1 {
    margin: 20px;
  }
  #box {
    width: 90%;
    max-width: 800px;
    height: 500px;
    background: #ccc;
    border: 4px solid #999;
    position: relative;
    overflow: hidden;
  }
  #ape {
    position: absolute;
    width: 100px;
    height: auto;
  }
  #button {
    margin: 20px;
    padding: 12px 20px;
    font-size: 1em;
  }
</style>
</head>
<body>
<h1>Move the Ape Randomly</h1>
<button id="button">Move Ape</button>
<div id="box">
  <img src="APE.png" id="ape" />
</div>
<script>
  const ape = document.getElementById('ape');
  const box = document.getElementById('box');
  document.getElementById('button').onclick = () => {
    const maxX = box.clientWidth - ape.offsetWidth;
    const maxY = box.clientHeight - ape.offsetHeight;
    const randX = Math.random() * maxX;
    const randY = Math.random() * maxY;
    ape.style.transition = 'all 1s ease';
    ape.style.left = randX + 'px';
    ape.style.top = randY + 'px';
  };
</script>
</body>
</html>
