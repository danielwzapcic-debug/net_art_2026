<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ape WORLD</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f7d358, #f27b4a);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  h1 {
    padding: 20px;
    font-size: 2em;
    margin: 0;
  }


  .scene {
    position: relative;
    width: 95%;
    max-width: 1000px;
    height: 700px;
    background: #87ceeb;
    border-radius: 20px;
    border: 4px solid #555;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    margin: 20px;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 20px;
  }

  /* Ground */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(90deg, #6b4f3b, #8b5e3c);
    border-top: 4px solid #554437;
  }

  
  #ape {
    position: absolute;
    bottom: 80px;
    width: 150px;
    height: 150px;
    cursor: pointer;
    transition: all 0.5s ease;
    left: 50%;
    transform: translateX(-50%);
  }

  #ape img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #fff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  /* Buttons */
  .buttons {
    margin: 20px;
  }

  button {
    padding: 12px 24px;
    font-size: 1.2em;
    border: none;
    border-radius: 8px;
    background: #fff;
    color: #4b1248;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    margin: 0 10px;
  }

  button:hover {
    background: #ffe8a1;
    transform: scale(1.05);
  }

  /* Floating clouds for atmosphere */
  .cloud {
    position: absolute;
    top: 50px;
    width: 150px;
    height: 70px;
    background: #fff;
    border-radius: 75px / 35px;
    opacity: 0.8;
    animation: floatCloud 25s linear infinite;
  }

  @keyframes floatCloud {
    0% { transform: translateX(0); }
    100% { transform: translateX(120vw); }
  }

  /* Different clouds with delays for variation */
  .cloud:nth-child(1) { left: -150px; animation-delay: 0s; }
  .cloud:nth-child(2) { top: 100px; left: -200px; animation-delay: 5s; }
  .cloud:nth-child(3) { top: 70px; left: -250px; animation-delay: 10s; }
</style>
</head>
<body>

<h1>🐒 Welcome to the Ape Scene! 🐒</h1>

<div class="buttons">
  <button id="moveBtn">Move the Ape</button>
  <button id="jumpBtn">Make the Ape Jump</button>
</div>

<div class="scene" id="scene">
  <!-- Clouds floating in the sky -->
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <!-- Ground -->
  <div class="ground"></div>
  <!-- The Ape -->
  <div id="ape">
    <img src="ape.png" alt="Ape" />
  </div>
</div>

<script>
  const moveBtn = document.getElementById('moveBtn');
  const jumpBtn = document.getElementById('jumpBtn');
  const ape = document.getElementById('ape');

  let isMovingRight = false;
  let isJumping = false;


  moveBtn.onclick = () => {
    if (isMovingRight) {
    
      ape.style.transition = 'left 1s ease, transform 1s ease';
      ape.style.left = '20%';
      ape.style.transform = 'translateX(-50%)';
    } else {
   
      ape.style.transition = 'left 1s ease, transform 1s ease';
      ape.style.left = '80%';
      ape.style.transform = 'translateX(-50%)';
    }
    isMovingRight = !isMovingRight;
  };


  jumpBtn.onclick = () => {
    if (isJumping) return;
    isJumping = true;
    ape.style.transition = 'transform 0.6s, box-shadow 0.3s';
    ape.style.transform = 'translateY(-150px) translateX(-50%)';
    ape.style.boxShadow = '0 20px 40px rgba(0,0,0,0.2)';
    setTimeout(() => {
      ape.style.transform = 'translateY(0) translateX(-50%)';
      ape.style.boxShadow = 'none';
      isJumping = false;
    }, 600);
  };
</script>

</body>
</html>
