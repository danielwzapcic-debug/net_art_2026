<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geometric Ape Quilt</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="grid-container">

    <!-- Background Pattern -->
    <div class="tile tile-red"></div>
    <div class="tile tile-blue"></div>
    <div class="tile tile-yellow"></div>
    <div class="tile tile-green"></div>
    <div class="tile tile-purple"></div>

    <div class="tile tile-blue"></div>
    <div class="tile tile-yellow"></div>
    <div class="tile tile-red"></div>
    <div class="tile tile-purple"></div>
    <div class="tile tile-green"></div>

    <div class="tile tile-yellow"></div>
    <div class="tile tile-red"></div>
    <div class="tile tile-green"></div>
    <div class="tile tile-blue"></div>
    <div class="tile tile-purple"></div>

    <div class="tile tile-green"></div>
    <div class="tile tile-purple"></div>
    <div class="tile tile-blue"></div>
    <div class="tile tile-red"></div>
    <div class="tile tile-yellow"></div>

    <!-- Center Feature -->
    <div class="ape-container">
        <img src="APE.png" alt="Ape Silhouette">
    </div>

</div>

</body>
</html>
