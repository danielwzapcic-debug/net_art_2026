<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🦍</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      animation: bgSnap 16s infinite steps(1);
    }

    @keyframes bgSnap {
      0%    { background: #ff003c; }
      12.5% { background: #00ff41; }
      25%   { background: #0d0d0d; }
      37.5% { background: #ffe600; }
      50%   { background: #ff6af8; }
      62.5% { background: #00e5ff; }
      75%   { background: #ff4500; }
      87.5% { background: #ffffff; }
      100%  { background: #ff003c; }
    }

    .word {
      position: fixed;
      font-family: 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: clamp(5rem, 18vw, 14rem);
      color: white;
      mix-blend-mode: difference;
      z-index: 3;
      pointer-events: none;
      letter-spacing: -4px;
      animation: wordMove 16s infinite steps(1);
    }

    @keyframes wordMove {
      0%    { top: 5%;  left: 2%;  transform: rotate(-3deg); }
      12.5% { top: 55%; left: 30%; transform: rotate(6deg);  }
      25%   { top: 20%; left: 50%; transform: rotate(0deg);  }
      37.5% { top: 70%; left: 5%;  transform: rotate(-8deg); }
      50%   { top: 35%; left: 15%; transform: rotate(2deg);  }
      62.5% { top: 10%; left: 40%; transform: rotate(-1deg); }
      75%   { top: 60%; left: 55%; transform: rotate(5deg);  }
      87.5% { top: 2%;  left: 10%; transform: rotate(-6deg); }
      100%  { top: 5%;  left: 2%;  transform: rotate(-3deg); }
    }

    /* each ape blinks in on a different step of the 16s cycle */
    img {
      position: fixed;
      z-index: 10;
      opacity: 0;
    }

    /* top left — small */
    img:nth-of-type(1) {
      top: 5%; left: 5%;
      width: 100px;
      transform: scaleX(-1);
      filter: drop-shadow(4px 4px 0 #000);
      animation: show1 16s infinite steps(1);
    }
    @keyframes show1 {
      0%    { opacity: 1; }
      12.5% { opacity: 0; }
      100%  { opacity: 0; }
    }

    /* bottom right — big */
    img:nth-of-type(2) {
      top: 55%; left: 60%;
      width: 280px;
      filter: drop-shadow(-6px 6px 0 #ffe600);
      animation: show2 16s infinite steps(1);
    }
    @keyframes show2 {
      0%    { opacity: 0; }
      12.5% { opacity: 1; }
      25%   { opacity: 0; }
      100%  { opacity: 0; }
    }

    /* top right — inverted medium */
    img:nth-of-type(3) {
      top: 5%; left: 65%;
      width: 160px;
      transform: scaleX(-1);
      filter: invert(1) drop-shadow(2px 2px 0 #ff003c);
      animation: show3 16s infinite steps(1);
    }
    @keyframes show3 {
      0%    { opacity: 0; }
      25%   { opacity: 1; }
      37.5% { opacity: 0; }
      100%  { opacity: 0; }
    }

    /* center — large */
    img:nth-of-type(4) {
      top: 30%; left: 35%;
      width: 320px;
      filter: drop-shadow(8px 0 0 #00ff41);
      animation: show4 16s infinite steps(1);
    }
    @keyframes show4 {
      0%    { opacity: 0; }
      37.5% { opacity: 1; }
      50%   { opacity: 0; }
      100%  { opacity: 0; }
    }

    /* bottom left — tiny flipped */
    img:nth-of-type(5) {
      top: 70%; left: 5%;
      width: 90px;
      transform: scaleX(-1);
      filter: drop-shadow(0 -4px 0 #000);
      animation: show5 16s infinite steps(1);
    }
    @keyframes show5 {
      0%    { opacity: 0; }
      50%   { opacity: 1; }
      62.5% { opacity: 0; }
      100%  { opacity: 0; }
    }

    /* mid left — inverted big */
    img:nth-of-type(6) {
      top: 20%; left: 10%;
      width: 240px;
      filter: invert(1) drop-shadow(4px 4px 0 #ff6af8);
      animation: show6 16s infinite steps(1);
    }
    @keyframes show6 {
      0%    { opacity: 0; }
      62.5% { opacity: 1; }
      75%   { opacity: 0; }
      100%  { opacity: 0; }
    }

    /* top center — flipped medium */
    img:nth-of-type(7) {
      top: 60%; left: 40%;
      width: 180px;
      transform: scaleX(-1);
      filter: drop-shadow(-4px 4px 0 #fff);
      animation: show7 16s infinite steps(1);
    }
    @keyframes show7 {
      0%    { opacity: 0; }
      75%   { opacity: 1; }
      87.5% { opacity: 0; }
      100%  { opacity: 0; }
    }

    /* far right — small */
    img:nth-of-type(8) {
      top: 10%; left: 78%;
      width: 120px;
      filter: drop-shadow(6px 6px 0 #0d0d0d);
      animation: show8 16s infinite steps(1);
    }
    @keyframes show8 {
      0%    { opacity: 0; }
      87.5% { opacity: 1; }
      100%  { opacity: 0; }
    }

    body:hover { animation-duration: 4s; }
    body:hover img { animation-duration: 4s; }
    body:hover .word { animation-duration: 4s; }
  </style>
</head>
<body>

  <div class="word">APE</div>

  <img src="APE.png" alt="" />
  <img src="APE.png" alt="" />
  <img src="APE.png" alt="" />
  <img src="APE.png" alt="" />
  <img src="APE.png" alt="" />
  <img src="APE.png" alt="" />
  <img src="APE.png" alt="" />
  <img src="APE.png" alt="" />

</body>
</html>
