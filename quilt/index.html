<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🦍</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      animation: bgSnap 16s infinite steps(1);
    }

    @keyframes bgSnap {
      0%    { background: #ff003c; }
      12.5% { background: #00ff41; }
      25%   { background: #0d0d0d; }
      37.5% { background: #ffe600; }
      50%   { background: #ff6af8; }
      62.5% { background: #00e5ff; }
      75%   { background: #ff4500; }
      87.5% { background: #ffffff; }
      100%  { background: #ff003c; }
    }

    .word {
      position: fixed;
      font-family: 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: clamp(5rem, 18vw, 14rem);
      line-height: 1;
      color: white;
      mix-blend-mode: difference;
      z-index: 3;
      pointer-events: none;
      letter-spacing: -4px;
      animation: wordMove 16s infinite steps(1);
    }

    @keyframes wordMove {
      0%    { top: 5%;  left: 2%;  transform: rotate(-3deg); }
      12.5% { top: 55%; left: 30%; transform: rotate(6deg);  }
      25%   { top: 20%; left: 50%; transform: rotate(0deg);  }
      37.5% { top: 70%; left: 5%;  transform: rotate(-8deg); }
      50%   { top: 35%; left: 15%; transform: rotate(2deg);  }
      62.5% { top: 10%; left: 40%; transform: rotate(-1deg); }
      75%   { top: 60%; left: 55%; transform: rotate(5deg);  }
      87.5% { top: 2%;  left: 10%; transform: rotate(-6deg); }
      100%  { top: 5%;  left: 2%;  transform: rotate(-3deg); }
    }

    /* fixed base size, scale handles big/small, scaleX(-1) flips */
    .ape {
      position: fixed;
      width: 200px;
      z-index: 10;
      transform-origin: top left;
      animation: apeMove 16s infinite steps(1);
    }

    .ape img {
      width: 100%;
      display: block;
      animation: apeFilter 16s infinite steps(1);
    }

    @keyframes apeMove {
      0%    { top: 8%;  left: 60%; transform: scale(0.9);        }
      12.5% { top: 55%; left: 5%;  transform: scale(1.3) scaleX(-1); }
      25%   { top: 5%;  left: 5%;  transform: scale(0.65);       }
      37.5% { top: 40%; left: 55%; transform: scale(1.1);        }
      50%   { top: 70%; left: 70%; transform: scale(1.5) scaleX(-1); }
      62.5% { top: 20%; left: 35%; transform: scale(0.75);       }
      75%   { top: 60%; left: 20%; transform: scale(1.0) scaleX(-1); }
      87.5% { top: 10%; left: 75%; transform: scale(0.55);       }
      100%  { top: 8%;  left: 60%; transform: scale(0.9);        }
    }

    @keyframes apeFilter {
      0%    { filter: drop-shadow(4px 4px 0px #000); }
      12.5% { filter: drop-shadow(-6px 6px 0px #ffe600); }
      25%   { filter: invert(1) drop-shadow(2px 2px 0px #ff003c); }
      37.5% { filter: drop-shadow(8px 0px 0px #00ff41); }
      50%   { filter: drop-shadow(0px -4px 0px #000); }
      62.5% { filter: invert(1) drop-shadow(4px 4px 0px #ff6af8); }
      75%   { filter: drop-shadow(-4px 4px 0px #fff); }
      87.5% { filter: drop-shadow(6px 6px 0px #0d0d0d); }
      100%  { filter: drop-shadow(4px 4px 0px #000); }
    }

    body:hover {
      animation-duration: 4s;
    }

    body:hover .ape,
    body:hover .ape img,
    body:hover .word {
      animation-duration: 4s;
    }
  </style>
</head>
<body>

  <div class="word">APE</div>

  <div class="ape">
    <img src="APE.png" alt="" />
  </div>

</body>
</html>
