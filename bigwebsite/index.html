<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Escaped Cryptid Zoo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="zoo-map">

    <h1 class="title">ESCAPED CRYPTID ZOO</h1>

    <!-- BURGER FOUNTAIN -->
    <div class="room burger-fountain">
        <h2>Burger Fountain</h2>
        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
    </div>

    <!-- WAITING ROOM -->
    <div class="room waiting-room">
        <h2>Waiting Room</h2>
        <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b" alt="Waiting Room">
    </div>

    <!-- GIFT SHOP -->
    <div class="room gift-shop">
        <h2>Gift Shop</h2>
        <img src="https://images.unsplash.com/photo-1607082350899-7e105aa886ae" alt="Gift Shop">
    </div>

    <!-- CRYPTIDS (NO DESCRIPTIONS) -->

    <div class="cryptid bigfoot">
        <h2>Bigfoot</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Paterson_film_frame_352.jpg" alt="Bigfoot">
    </div>

    <div class="cryptid mothman">
        <h2>Mothman</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Mothman_statue_Point_Pleasant.jpg" alt="Mothman">
    </div>

    <div class="cryptid nessie">
        <h2>Nessie</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/LochNessMonster.jpg" alt="Nessie">
    </div>

    <div class="cryptid chupacabra">
        <h2>Chupacabra</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f3/Chupacabra_sketch.jpg" alt="Chupacabra">
    </div>

    <div class="cryptid jersey-devil">
        <h2>Jersey Devil</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/23/Jersey_Devil_Philadelphia_Post_1909.jpg" alt="Jersey Devil">
    </div>

    <div class="cryptid flatwoods">
        <h2>Flatwoods Monster</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Flatwoods_monster_sketch.jpg" alt="Flatwoods Monster">
    </div>

    <!-- CONTROL ROOM (SECRET CORNER) -->
    <div id="control-room">
        <h2>Control Room</h2>
        <img src="https://images.unsplash.com/photo-1581092335397-9fa341108a2b" alt="Control Room">
    </div>

    <!-- RANDOM DEPTH IMAGES -->
    <img class="floating-image cam" src="https://images.unsplash.com/photo-1518770660439-4636190af475" alt="Security Camera">
    <img class="floating-image fence" src="https://images.unsplash.com/photo-1508780709619-79562169bc64" alt="Fence">
    <img class="floating-image caution" src="https://images.unsplash.com/photo-1581093458791-9d09f3c6f7c6" alt="Caution Sign">

    <!-- SECRET TEXT -->
    <span class="tiny-secret">you are not alone</span>

</div>

</body>
</html>
