<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Escaped Cryptid Zoo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="zoo-map">

    <h1 class="title">ESCAPED CRYPTID ZOO</h1>

    <!-- WAITING ROOM -->
    <div class="room waiting-room">
        <h2>Waiting Room</h2>
        <p>The lights flicker softly.</p>
        <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b" alt="Empty Waiting Room">
    </div>

    <!-- SODA FOUNTAIN -->
    <div class="room soda-fountain">
        <h2>Soda Fountain</h2>
        <p>Today's Special: <span class="mystery">Mystery Syrup</span></p>
        <img src="https://images.unsplash.com/photo-1586190848861-99aa4a171e90" alt="Soda Fountain">
    </div>

    <!-- BIGFOOT -->
    <div class="cryptid bigfoot">
        <h2>Bigfoot Habitat</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Paterson_film_frame_352.jpg" alt="Bigfoot">
        <p>Status: <span class="escaped">ESCAPED</span></p>
    </div>

    <!-- MOTHMAN -->
    <div class="cryptid mothman">
        <h2>Mothman Dome</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Mothman_statue_Point_Pleasant.jpg" alt="Mothman">
        <p>Drawn to power surges.</p>
    </div>

    <!-- NESSIE -->
    <div class="cryptid nessie">
        <h2>Loch Ness Tank</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/LochNessMonster.jpg" alt="Nessie">
        <p>The water is empty.</p>
    </div>

    <!-- CONTROL ROOM -->
    <div id="control-room">
        <h2>Security Control Room</h2>
        <p>All camera feeds offline.</p>
        <img src="https://images.unsplash.com/photo-1581092335397-9fa341108a2b" alt="Control Room">
    </div>

    <!-- SECRET MESSAGE -->
    <p class="tiny-secret">they were never contained</p>

</div>

</body>
</html>
